name: gate

# The unbypassable backstop.
# hook, but this re-runs the same checks on every PR and push, so nothing merges
# without passing them. Branch protection makes this required.

on:
  pull_request:
  push:
    branches: [main, master, prod, production]

env:
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"
  SEMGREP_FORCE_COLOR: "1"
  TERM: "xterm-256color"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development
          vulnerability-check: true
          warn-only: false

  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: uv Sync Dependencies
        run: uv sync

      - name: Ruff Lint
        run: uv run --no-cache --no-sync ruff check --show-fixes .

      - name: Ruff Format Check
        run: uv run --no-sync ruff format --check
        continue-on-error: true # never fail the build

      - name: Complexipy Cognitive Check
        run: uv run --no-sync complexipy . --no-ignore --report-ignored --suggest-refactors --sort file_name

      - name: Pylint Structural Rules
        run: uv run --no-sync pylint src harness

      - name: Pyright Type Check
        run: uv run --no-sync pyright --outputjson

      - name: Semgrep Security Scan
        run: uv run --no-sync semgrep scan --error --config auto --config p/secrets --exclude-rule yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag .

      - name: Tests with Coverage Gate
        run: uv run --no-cache --no-sync pytest --cov --cov-report=term-missing --cov-fail-under=100

  # The full gate above runs once on Linux.
  # This job runs on Windows we can't run. It only proves install + collection work.
  # A Windows dev should add a real ralph.ps1 test.
  loop-runner:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: uv Sync Dependencies
        run: uv sync
      - name: Loop-runner tests (ralph.sh on POSIX; skips on Windows)
        run: uv run --no-sync pytest harness/tests/test_ralph.py -q
